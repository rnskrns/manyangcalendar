                        </div>
                    </div>
                    <div style="display: flex; gap: 14px;">
                        <div style="flex: 1;"><label style="display: block; font-weight: 800; margin-bottom: 6px; color: #7A5A2F;">시작 날짜 *</label><input type="date" id="eventStartDate" class="event-custom-input"></div>
                        <div style="flex: 1;"><label style="display: block; font-weight: 800; margin-bottom: 6px; color: #7A5A2F;">종료 날짜 *</label><input type="date" id="eventEndDate" class="event-custom-input"></div>
                    </div>
                    <div>
                        <label style="display: block; font-weight: 800; margin-bottom: 6px; color: #7A5A2F;">유형</label>
                        <select id="eventType" class="event-custom-input" style="cursor: pointer; font-weight: bold;">
                            <option value="개인방송">개인방송</option><option value="합방">합방</option><option value="휴방">휴방</option><option value="시네티">시네티</option><option value="LCK">LCK</option><option value="미확정">미확정</option>
                        </select>
                    </div>
                </div>
                <div class="event-modal-right">
                    <div><label style="display: block; font-weight: 800; margin-bottom: 6px; color: #7A5A2F;">참여 멤버 (쉼표로 구분)</label><input type="text" id="eventMembers" placeholder=",로 구별 예)마냥,멤버2,멤버3" class="event-custom-input"></div>
                    <div>
                        <label style="display: block; font-weight: 800; margin-bottom: 6px; color: #7A5A2F;">포스터 / 썸네일 이미지</label>
                        <input type="file" id="eventImgFile" accept="image/*" onchange="handleEventImgUpload(this)" style="display: block; margin-bottom: 12px; font-size: 13px; color: #64748b; cursor: pointer;">
                        <input type="hidden" id="eventImageUrl">
                        <div id="imagePreviewContainer" style="text-align: center; background: #fafaf9; padding: 20px; border-radius: 12px; border: 2px dashed #cbd5e1;"><img id="eventImagePreview" src="" alt="미리보기" style="display: none; max-width: 100%; max-height: 160px; border-radius: 8px; margin: 0 auto 12px auto;"><p id="eventImagePlaceholder" style="color: #94a3b8; font-size: 13px; margin: 0; font-weight: bold;">이미지를 업로드하면 여기에 표시됩니다</p><button type="button" id="removeImageBtn" onclick="removeEventImage()" style="display: none; background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;">이미지 지우기 ✕</button></div>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 36px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
                <button onclick="closeModal('eventModal')" style="padding: 12px 24px; background: #f1f5f9; color: #64748b; border: none; border-radius: 30px; cursor: pointer; font-weight: 800;">취소</button>
                <button onclick="saveEvent()" style="padding: 12px 24px; background: #FDE047; color: #7A5A2F; border: none; border-radius: 30px; cursor: pointer; font-weight: 800;">저장</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal"><div class="modal-content"><div id="infoTitle" class="info-title"></div><div class="info-block"><div id="infoTime" class="time-badge"></div><div id="infoImageContainer" class="info-image-container"></div><div id="infoProfiles" class="profile-list"></div></div><button class="btn btn-cancel" style="margin-top: 15px;" onclick="closeModal('infoModal')">닫기</button></div></div>
    
    <div id="pwModal" class="modal">
        <div class="modal-content pw-modal" style="max-width: 400px;">
            <h3 class="text-center font-black mb-5" style="font-size:24px; font-family: 'TMoneyDungunbaram', sans-serif;">관리자 인증</h3>
            
            <div id="profileSelectionArea" style="display:none; margin-bottom: 20px;">
                <p style="text-align:center; font-weight:bold; color:#7A5A2F; margin-bottom: 12px;">누가 로그인하나요?</p>
                <div id="adminProfileList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:10px; justify-content:center;"></div>
                <hr style="border: 0; border-top: 1px dashed #E5E7EB; margin: 15px 0;">
            </div>

            <div id="idPwArea">
                <input type="text" id="adminId" class="admin-pw" placeholder="아이디 (프로필 이름)" style="margin-bottom: 8px;">
                <input type="password" id="adminPw" class="admin-pw" placeholder="비밀번호" onkeyup="if(event.key==='Enter') loginAdmin()">
                
                <div style="margin: 5px 0 15px 0; text-align: left;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 700; color: #7A5A2F;">
                        <input type="checkbox" id="stayLoggedIn" style="width: 16px; height: 16px; cursor: pointer;"> 로그인 상태 유지
                    </label>
                </div>
                
                <p id="pwError" class="pw-error hidden">로그인 정보가 올바르지 않습니다.</p>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-cancel" onclick="closeModal('pwModal')">취소</button>
                <button class="btn btn-save" onclick="loginAdmin()">로그인</button>
            </div>
        </div>
    </div>

    <div id="pwChangeModal" class="modal">
        <div class="modal-content pw-modal" style="max-width: 400px;">
            <h3 class="text-center font-black mb-5" style="font-size:24px; font-family: 'TMoneyDungunbaram', sans-serif;">암호 변경</h3>
            
            <div id="pwChangeArea">
                <input type="password" id="currentPwInput" class="admin-pw" placeholder="현재 비밀번호" style="margin-bottom: 8px;">
                <input type="password" id="newPwInput" class="admin-pw" placeholder="새 비밀번호" style="margin-bottom: 8px;">
                <input type="password" id="confirmPwInput" class="admin-pw" placeholder="새 비밀번호 확인" style="margin-bottom: 8px;" onkeyup="if(event.key==='Enter') changeAdminPassword()">
                
                <p id="pwChangeError" class="pw-error hidden"></p>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-cancel" onclick="closeModal('pwChangeModal')">취소</button>
                <button class="btn btn-save" onclick="changeAdminPassword()">변경</button>
            </div>
        </div>
    </div>
    
    <div id="memberModal" class="modal"><div class="modal-content"><h3 class="modal-title">멤버 관리</h3><div id="memberList" class="member-list"></div><div class="member-add-box"><h4 style="font-weight:900; margin-bottom:12px;">새 멤버 추가</h4><input type="text" id="newMemberName" class="admin-input" placeholder="멤버 이름 (닉네임)" style="margin-bottom: 8px;"><input type="text" id="newMemberId" class="admin-input" placeholder="SOOP 아이디" style="margin-bottom: 12px;"><input type="hidden" id="newMemberImg"><button class="btn btn-save" style="width:100%; padding:14px;" onclick="addMember()">추가하기</button></div><button class="btn btn-cancel" style="margin-top:15px;" onclick="closeModal('memberModal')">닫기</button></div></div>
    
    <div id="confirmModal" class="modal"><div class="modal-content" style="max-width: 320px; align-items: center; text-align: center;"><h3 id="confirmMessage" class="font-black text-lg mb-6"></h3><div class="btn-group" style="width: 100%;"><button class="btn btn-cancel" onclick="closeModal('confirmModal')">취소</button><button id="confirmBtn" class="btn btn-danger">삭제</button></div></div></div>
    
    <div id="monthPickerModal" class="modal"><div class="modal-content" style="max-width: 380px;"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><button class="nav-btn" onclick="changePickerYear(-1)">◀</button><h3 id="pickerYearDisplay" class="font-black text-2xl m-0"></h3><button class="nav-btn" onclick="changePickerYear(1)">▶</button></div><div class="month-picker-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div><button class="btn btn-cancel mt-6" onclick="closeModal('monthPickerModal')">닫기</button></div></div>

    <div id="textCopyModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
        <div style="background:#fff; padding:32px 40px; border-radius:30px; display:flex; flex-direction:column; gap:16px; width:90%; max-width:550px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h2 style="margin:0; font-family:'TMoneyDungunbaram', sans-serif; color:#7A5A2F; font-size:24px; text-align:center;">일정 복사하기</h2>
            
            <!-- Step 1: 날짜 선택 -->
            <div id="textCopyStep1" style="display:flex; flex-direction:column; gap:12px;">
                <div>
                    <label style="display:block; font-weight:800; margin-bottom:6px; color:#7A5A2F;">시작 날짜</label>
                    <input type="date" id="copyStartDate" class="event-custom-input">
                </div>
                <div>
                    <label style="display:block; font-weight:800; margin-bottom:6px; color:#7A5A2F;">종료 날짜</label>
                    <input type="date" id="copyEndDate" class="event-custom-input">
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="closeModal('textCopyModal')" style="flex:1; padding:12px; border:none; border-radius:30px; cursor:pointer; background:#f1f5f9; color:#64748b; font-weight:bold; font-size:15px;">취소</button>
                    <button onclick="generateScheduleText()" style="flex:1; padding:12px; border:none; border-radius:30px; cursor:pointer; background:#7ca349; color:white; font-weight:bold; font-size:15px;">확인</button>
                </div>
            </div>

            <div id="textCopyStep2" style="display:none; flex-direction:column; gap:12px;">
                <div>
                    <label style="display:block; font-weight:800; margin-bottom:6px; color:#7A5A2F;">미리보기</label>
                    <textarea id="scheduleTextPreview" class="event-custom-input" style="min-height: 400px; resize: vertical; font-family: inherit; font-size: 14px; line-height: 1.5; background: #fafaf9;" readonly></textarea>

                <div style="display:flex; gap:10px; margin-top:10px;">

                    <button onclick="copyScheduleText()" style="flex:1; padding:12px; border:none; border-radius:30px; cursor:pointer; background:#7ca349; color:#ffffff; font-weight:bold; font-size:15px;">복사하기</button>
                </div>
            </div>
        </div>
    </div>
